<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — MeuDoc.app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=2">
<link rel="stylesheet" href="assets/app-shell.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .agenda-grid { display: flex; flex-direction: column; gap: 12px; }
  .agenda-card {
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: var(--r-lg);
    padding: 20px;
    display: flex; gap: 16px; align-items: flex-start;
    transition: all var(--t);
  }
  .agenda-card:hover { border-color: var(--cinza-claro); box-shadow: var(--sh-sm); }
  .agenda-card.concluido { opacity: 0.6; }
  .agenda-card.cancelado { opacity: 0.5; border-style: dashed; }
  .data-block {
    flex-shrink: 0;
    width: 70px;
    text-align: center;
    background: var(--neve);
    border: 1px solid var(--borda);
    border-radius: var(--r-md);
    padding: 10px 6px;
  }
  .data-mes { font-family: var(--font-display); font-size: 10px; color: var(--coral); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
  .data-dia { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--noite); line-height: 1; margin-top: 2px; }
  .data-hora { font-size: 11px; color: var(--cinza); margin-top: 4px; font-weight: 600; }
  .agenda-info { flex: 1; min-width: 0; }
  .agenda-titulo { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .agenda-meta { font-size: 13px; color: var(--cinza); display: flex; flex-wrap: wrap; gap: 6px 14px; }
  .agenda-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .agenda-meta [data-lucide] { width: 13px; height: 13px; }
  .agenda-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .agenda-act {
    width: 32px; height: 32px;
    border-radius: var(--r-sm);
    background: var(--neve);
    border: 1px solid var(--borda);
    color: var(--cinza);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .agenda-act:hover { color: var(--noite); }
  .agenda-act.danger:hover { color: var(--perigo); border-color: var(--perigo); }
  .agenda-act [data-lucide] { width: 16px; height: 16px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--branco); border-radius: var(--r-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--sh-lg); animation: fadeIn 0.3s ease-out; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--borda); }
  .modal-header h2 { font-size: 18px; }
  .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: var(--r-md); color: var(--cinza); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .modal-close:hover { background: var(--neve); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--borda); display: flex; gap: 10px; justify-content: flex-end; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

  .empty-state {
    background: var(--branco);
    border: 2px dashed var(--borda);
    border-radius: var(--r-lg);
    padding: 56px 32px;
    text-align: center;
  }
  .empty-state .icon-box { margin: 0 auto 16px; }
  .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
  .empty-state p { color: var(--cinza); max-width: 400px; margin: 0 auto 20px; line-height: 1.6; }

  /* === BOTTOM NAV (inline anti-cache) === */
  .bottom-nav { display: none; }
  @media (max-width: 900px) {
    .bottom-nav {
      display: flex !important;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--branco);
      border-top: 1px solid var(--borda);
      padding: 6px 8px calc(8px + env(safe-area-inset-bottom)) 8px;
      justify-content: space-around;
      align-items: flex-end;
      z-index: 999;
      box-shadow: 0 -4px 20px rgba(15,23,42,0.08);
    }
    .content { padding-bottom: 90px !important; }
  }
  .bottom-nav .bn-item {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    padding: 6px 4px;
    color: var(--cinza-claro);
    text-decoration: none;
    font-size: 10px;
    font-weight: 600;
    font-family: var(--font-display);
    flex: 1;
    text-align: center;
    transition: all 0.2s;
    min-width: 0;
  }
  .bottom-nav .bn-item [data-lucide] { width: 22px; height: 22px; stroke-width: 2; }
  .bottom-nav .bn-item.active { color: var(--coral); }
  .bottom-nav .bn-item.active [data-lucide] { stroke-width: 2.5; }
  .bottom-nav .bn-center {
    background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
    color: var(--branco) !important;
    width: 58px; height: 58px;
    border-radius: 50%;
    margin-top: -28px;
    box-shadow: 0 8px 24px rgba(255,90,54,0.5);
    flex: 0 0 auto;
    padding: 0;
  }
  .bottom-nav .bn-center [data-lucide] { width: 26px; height: 26px; stroke-width: 2.3; color: white; }
  .bottom-nav .bn-center span { display: none; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo">MeuDoc<span>.app</span></div>
  <div class="sb-user">
    <div class="avatar" id="sbAvatar">M</div>
    <div class="sb-user-info">
      <div class="sb-user-name" id="sbUserName">Carregando...</div>
      <div class="sb-user-plan" id="sbUserPlan">Plano grátis</div>
    </div>
  </div>
  <nav class="sb-nav">
    <a href="dashboard.html" class="sb-link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    <a href="documentos.html" class="sb-link"><i data-lucide="folder"></i> Documentos</a>
    <a href="alertas.html" class="sb-link"><i data-lucide="bell"></i> Alertas</a>
    <a href="agendamentos.html" class="sb-link active"><i data-lucide="calendar"></i> Agenda</a>
    <a href="assistente.html" class="sb-link"><i data-lucide="sparkles"></i> Lia (assistente)</a>
    <div class="sb-section">Conta</div>
    <a href="perfil.html" class="sb-link"><i data-lucide="user"></i> Perfil</a>
  </nav>
  <div class="sb-footer">
    <a href="#" class="sb-link" onclick="logout();return false;"><i data-lucide="log-out"></i> Sair</a>
  </div>
</aside>
<div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>

<main class="content">
  <header class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="menu-toggle-mobile" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
      <div class="greeting">
        <h1>Agenda</h1>
        <p id="agendaCount">Seus agendamentos em órgãos públicos</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="openAdd()"><i data-lucide="plus" class="icon-sm"></i> Novo agendamento</button>
    </div>
  </header>

  <div class="page">
    <div id="agendaContainer"></div>
  </div>
</main>

<!-- BOTTOM NAV mobile -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="bn-item"><i data-lucide="home"></i><span>Início</span></a>
  <a href="documentos.html" class="bn-item"><i data-lucide="folder"></i><span>Docs</span></a>
  <a href="assistente.html" class="bn-item bn-center"><i data-lucide="sparkles"></i><span>Lia</span></a>
  <a href="alertas.html" class="bn-item"><i data-lucide="bell"></i><span>Alertas</span></a>
  <a href="perfil.html" class="bn-item"><i data-lucide="user"></i><span>Perfil</span></a>
</nav>

<div class="modal-overlay" id="modalAg">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Novo agendamento</h2>
      <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="aId">
      <div class="form-group">
        <label class="label">Órgão</label>
        <input class="input" id="aOrgao" placeholder="Ex: Poupatempo, Detran, Receita Federal">
      </div>
      <div class="form-group">
        <label class="label">Serviço</label>
        <input class="input" id="aServico" placeholder="Ex: Renovação CNH, Emissão RG">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="label">Data</label>
          <input class="input" type="date" id="aData">
        </div>
        <div class="form-group">
          <label class="label">Horário</label>
          <input class="input" type="time" id="aHorario">
        </div>
      </div>
      <div class="form-group">
        <label class="label">Local</label>
        <input class="input" id="aLocal" placeholder="Ex: Poupatempo Sé, Av. X, 123">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="label">Protocolo (opcional)</label>
          <input class="input" id="aProtocolo" placeholder="Nº de protocolo">
        </div>
        <div class="form-group">
          <label class="label">Status</label>
          <select class="input" id="aStatus">
            <option value="agendado">Agendado</option>
            <option value="concluido">Concluído</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnSave" onclick="save()">Salvar</button>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://gwepkpbtcwvgxfgqhymb.supabase.co',
    'sb_publishable_0NiRNQMNyhdaX4LDEwNq8A_QkWpzM8J'
  );

  let currentUser = null, profile = null, agendamentos = [];

  (async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    const { data: p } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    profile = p || { id: currentUser.id, email: currentUser.email, plano: 'gratis' };
    renderUser();
    await load();
    lucide.createIcons();
  })();

  function renderUser() {
    const nome = profile.nome || currentUser.email.split('@')[0];
    document.getElementById('sbUserName').textContent = nome;
    document.getElementById('sbAvatar').textContent = nome.charAt(0).toUpperCase();
    document.getElementById('sbUserPlan').textContent = { gratis: 'Plano grátis', premium: 'Premium', familia: 'Família' }[profile.plano] || 'Plano grátis';
  }

  async function load() {
    const { data } = await sb.from('agendamentos').select('*').eq('user_id', currentUser.id).order('data_agendamento', { ascending: true });
    agendamentos = data || [];
    render();
  }

  function render() {
    const container = document.getElementById('agendaContainer');
    if (agendamentos.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon-box icon-box-lg lavanda"><i data-lucide="calendar-plus" class="icon-xl"></i></div>
          <h3>Nenhum agendamento ainda</h3>
          <p>Cadastre seus agendamentos no Poupatempo, Detran, Receita Federal e outros órgãos. A Lia te lembra antes da data.</p>
          <button class="btn btn-primary" onclick="openAdd()"><i data-lucide="plus" class="icon-sm"></i> Adicionar primeiro</button>
        </div>`;
      lucide.createIcons();
      return;
    }
    const meses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
    container.innerHTML = '<div class="agenda-grid">' + agendamentos.map(a => {
      const dt = a.data_agendamento ? new Date(a.data_agendamento) : null;
      const dia = dt ? dt.getDate() : '—';
      const mes = dt ? meses[dt.getMonth()] : '';
      const ano = dt ? dt.getFullYear() : '';
      const statusClass = a.status === 'concluido' ? 'concluido' : a.status === 'cancelado' ? 'cancelado' : '';
      const statusBadge = { agendado: '<span class="badge badge-lavanda">Agendado</span>', concluido: '<span class="badge badge-menta">Concluído</span>', cancelado: '<span class="badge badge-perigo">Cancelado</span>' }[a.status] || '';
      return `
        <div class="agenda-card ${statusClass}">
          <div class="data-block">
            <div class="data-mes">${mes}</div>
            <div class="data-dia">${dia}</div>
            <div class="data-hora">${a.horario || '--:--'}</div>
          </div>
          <div class="agenda-info">
            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px;">
              <div class="agenda-titulo">${a.servico || 'Agendamento'}</div>
              ${statusBadge}
            </div>
            <div class="agenda-meta">
              ${a.orgao ? `<span><i data-lucide="landmark"></i> ${a.orgao}</span>` : ''}
              ${a.local ? `<span><i data-lucide="map-pin"></i> ${a.local}</span>` : ''}
              ${a.protocolo ? `<span><i data-lucide="hash"></i> ${a.protocolo}</span>` : ''}
            </div>
          </div>
          <div class="agenda-actions">
            <button class="agenda-act" onclick="edit('${a.id}')" title="Editar"><i data-lucide="pencil"></i></button>
            <button class="agenda-act danger" onclick="del('${a.id}')" title="Excluir"><i data-lucide="trash-2"></i></button>
          </div>
        </div>
      `;
    }).join('') + '</div>';
    lucide.createIcons();
  }

  function openAdd() {
    document.getElementById('modalTitle').textContent = 'Novo agendamento';
    ['aId','aOrgao','aServico','aData','aHorario','aLocal','aProtocolo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('aStatus').value = 'agendado';
    document.getElementById('modalAg').classList.add('show');
    lucide.createIcons();
  }
  function closeModal() { document.getElementById('modalAg').classList.remove('show'); }

  function edit(id) {
    const a = agendamentos.find(x => x.id === id); if (!a) return;
    document.getElementById('modalTitle').textContent = 'Editar agendamento';
    document.getElementById('aId').value = a.id;
    document.getElementById('aOrgao').value = a.orgao || '';
    document.getElementById('aServico').value = a.servico || '';
    document.getElementById('aData').value = a.data_agendamento || '';
    document.getElementById('aHorario').value = a.horario || '';
    document.getElementById('aLocal').value = a.local || '';
    document.getElementById('aProtocolo').value = a.protocolo || '';
    document.getElementById('aStatus').value = a.status || 'agendado';
    document.getElementById('modalAg').classList.add('show');
    lucide.createIcons();
  }

  async function save() {
    const id = document.getElementById('aId').value;
    const payload = {
      user_id: currentUser.id,
      orgao: document.getElementById('aOrgao').value.trim() || null,
      servico: document.getElementById('aServico').value.trim() || null,
      data_agendamento: document.getElementById('aData').value || null,
      horario: document.getElementById('aHorario').value || null,
      local: document.getElementById('aLocal').value.trim() || null,
      protocolo: document.getElementById('aProtocolo').value.trim() || null,
      status: document.getElementById('aStatus').value
    };
    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = 'Salvando...';
    let result;
    if (id) result = await sb.from('agendamentos').update(payload).eq('id', id);
    else result = await sb.from('agendamentos').insert(payload);
    btn.disabled = false; btn.textContent = 'Salvar';
    if (result.error) { alert('Erro: ' + result.error.message); return; }
    closeModal();
    await load();
  }

  async function del(id) {
    if (!confirm('Excluir esse agendamento?')) return;
    const { error } = await sb.from('agendamentos').delete().eq('id', id);
    if (error) { alert('Erro: ' + error.message); return; }
    await load();
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sbOverlay').classList.toggle('show');
  }
  async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }
</script>
</body>
</html>
