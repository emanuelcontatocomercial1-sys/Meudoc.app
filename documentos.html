<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentos — MeuDoc.app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/app-shell.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .page-actions { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: space-between; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 14px;
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: var(--r-full);
    font-family: var(--font-display);
    font-size: 13px; font-weight: 600;
    color: var(--cinza);
    cursor: pointer; transition: all var(--t);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .filter-btn:hover { border-color: var(--coral); color: var(--coral); }
  .filter-btn.active { background: var(--noite); color: var(--branco); border-color: var(--noite); }
  .filter-btn .count { background: rgba(255,255,255,0.2); padding: 1px 7px; border-radius: var(--r-full); font-size: 11px; }
  .filter-btn:not(.active) .count { background: var(--neve); color: var(--cinza); }

  .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .doc-card {
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: var(--r-lg);
    padding: 20px;
    transition: all var(--t);
    cursor: pointer;
    position: relative;
  }
  .doc-card:hover { transform: translateY(-3px); box-shadow: var(--sh-md); border-color: var(--cinza-claro); }
  .doc-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .doc-card .icon-box { width: 44px; height: 44px; }
  .doc-card .icon-box [data-lucide] { width: 22px; height: 22px; }
  .doc-card h3 { font-size: 16px; margin-bottom: 4px; }
  .doc-card-meta { font-size: 12px; color: var(--cinza); }
  .doc-card-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--noite); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--borda); font-weight: 600; }
  .doc-card-actions { position: absolute; top: 12px; right: 12px; display: none; gap: 4px; }
  .doc-card:hover .doc-card-actions { display: flex; }
  .doc-act-btn {
    width: 28px; height: 28px;
    border-radius: var(--r-sm);
    background: var(--neve);
    border: 1px solid var(--borda);
    color: var(--cinza);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .doc-act-btn:hover { color: var(--noite); background: var(--branco); }
  .doc-act-btn.danger:hover { color: var(--perigo); border-color: var(--perigo); }
  .doc-act-btn [data-lucide] { width: 14px; height: 14px; }

  /* === MODAL === */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--branco);
    border-radius: var(--r-lg);
    width: 100%; max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--sh-lg);
    animation: fadeIn 0.3s ease-out;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--borda);
  }
  .modal-header h2 { font-size: 18px; }
  .modal-close {
    background: none; border: none;
    width: 32px; height: 32px;
    border-radius: var(--r-md);
    color: var(--cinza);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .modal-close:hover { background: var(--neve); color: var(--noite); }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--borda);
    display: flex; gap: 10px; justify-content: flex-end;
  }

  .add-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  @media (max-width: 480px) { .add-options { grid-template-columns: 1fr; } }
  .add-opt {
    padding: 20px;
    border: 2px dashed var(--borda);
    border-radius: var(--r-md);
    text-align: center;
    cursor: pointer;
    transition: all var(--t);
    background: var(--neve);
  }
  .add-opt:hover { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); }
  .add-opt [data-lucide] { width: 28px; height: 28px; color: var(--coral); margin-bottom: 8px; }
  .add-opt-title { font-family: var(--font-display); font-weight: 700; font-size: 14px; }
  .add-opt-sub { font-size: 12px; color: var(--cinza); margin-top: 2px; }

  .ocr-status {
    background: var(--lavanda-light);
    color: var(--lavanda-dark);
    padding: 12px 16px;
    border-radius: var(--r-md);
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
    align-items: center; gap: 10px;
  }
  .ocr-status.show { display: flex; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

  .preview-img {
    max-width: 100%;
    max-height: 200px;
    border-radius: var(--r-md);
    margin-bottom: 16px;
    border: 1px solid var(--borda);
  }

  .empty-state {
    background: var(--branco);
    border: 2px dashed var(--borda);
    border-radius: var(--r-lg);
    padding: 64px 32px;
    text-align: center;
  }
  .empty-state .icon-box { margin: 0 auto 16px; }
  .empty-state h3 { font-size: 22px; margin-bottom: 8px; }
  .empty-state p { color: var(--cinza); max-width: 420px; margin: 0 auto 24px; line-height: 1.6; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo">MeuDoc<span>.app</span></div>
  <div class="sb-user">
    <div class="avatar" id="sbAvatar">M</div>
    <div class="sb-user-info">
      <div class="sb-user-name" id="sbUserName">Carregando...</div>
      <div class="sb-user-plan" id="sbUserPlan">Plano grátis</div>
    </div>
  </div>
  <nav class="sb-nav">
    <a href="dashboard.html" class="sb-link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    <a href="documentos.html" class="sb-link active"><i data-lucide="folder"></i> Documentos</a>
    <a href="alertas.html" class="sb-link"><i data-lucide="bell"></i> Alertas</a>
    <a href="agendamentos.html" class="sb-link"><i data-lucide="calendar"></i> Agenda</a>
    <a href="assistente.html" class="sb-link"><i data-lucide="sparkles"></i> Bia (assistente)</a>
    <div class="sb-section">Conta</div>
    <a href="perfil.html" class="sb-link"><i data-lucide="user"></i> Perfil</a>
  </nav>
  <div class="sb-footer">
    <a href="#" class="sb-link" onclick="logout();return false;"><i data-lucide="log-out"></i> Sair</a>
  </div>
</aside>
<div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>

<main class="content">
  <header class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="menu-toggle-mobile" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
      <div class="greeting">
        <h1>Meus Documentos</h1>
        <p id="docsCount">0 documentos cadastrados</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i data-lucide="plus" class="icon-sm"></i> Adicionar</button>
    </div>
  </header>

  <div class="page">

    <div class="page-actions">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="todos">Todos <span class="count" id="cntTodos">0</span></button>
        <button class="filter-btn" data-filter="emdia">Em dia <span class="count" id="cntEmDia">0</span></button>
        <button class="filter-btn" data-filter="vencendo">Vencendo <span class="count" id="cntVencendo">0</span></button>
        <button class="filter-btn" data-filter="vencido">Vencido <span class="count" id="cntVencido">0</span></button>
      </div>
    </div>

    <div id="docsContainer"></div>

  </div>
</main>

<!-- MODAL: ADD/EDIT DOCUMENT -->
<div class="modal-overlay" id="modalDoc">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Adicionar documento</h2>
      <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div id="modalStep1">
        <p style="color:var(--cinza); margin-bottom:16px; font-size:14px;">Como você quer adicionar?</p>
        <div class="add-options">
          <label class="add-opt">
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="onFileSelected(event)">
            <i data-lucide="camera"></i>
            <div class="add-opt-title">Tirar foto</div>
            <div class="add-opt-sub">A Bia lê os dados</div>
          </label>
          <label class="add-opt">
            <input type="file" accept="image/*,application/pdf" style="display:none" onchange="onFileSelected(event)">
            <i data-lucide="upload"></i>
            <div class="add-opt-title">Enviar arquivo</div>
            <div class="add-opt-sub">Foto ou PDF</div>
          </label>
        </div>
        <div style="text-align:center; margin: 8px 0; color: var(--cinza-claro); font-size: 13px;">ou</div>
        <button class="btn btn-secondary btn-full" onclick="showFormStep()"><i data-lucide="keyboard" class="icon-sm"></i> Preencher manualmente</button>
      </div>

      <div id="modalStep2" style="display:none;">
        <img id="previewImg" class="preview-img" style="display:none">
        <div class="ocr-status" id="ocrStatus">
          <span class="spinner" style="border-color: rgba(124,58,237,0.3); border-top-color: var(--lavanda);"></span>
          <span>A Bia está lendo o documento...</span>
        </div>

        <input type="hidden" id="fDocId">
        <div class="form-group">
          <label class="label">Nome do documento</label>
          <input class="input" id="fNome" placeholder="Ex: Meu RG, CNH 2026">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="label">Tipo</label>
            <select class="input" id="fTipo">
              <option value="">Selecione...</option>
              <option value="RG">RG</option>
              <option value="CIN">CIN</option>
              <option value="CPF">CPF</option>
              <option value="CNH">CNH</option>
              <option value="PASSAPORTE">Passaporte</option>
              <option value="TITULO_ELEITOR">Título de Eleitor</option>
              <option value="CERTIDAO_NASCIMENTO">Certidão de Nascimento</option>
              <option value="CERTIDAO_CASAMENTO">Certidão de Casamento</option>
              <option value="CARTEIRA_TRABALHO">Carteira de Trabalho</option>
              <option value="CARTEIRA_VACINACAO">Carteira de Vacinação</option>
              <option value="OUTRO">Outro</option>
            </select>
          </div>
          <div class="form-group">
            <label class="label">Número</label>
            <input class="input" id="fNumero" placeholder="Sem formatação">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="label">Data de emissão</label>
            <input class="input" type="date" id="fEmissao">
          </div>
          <div class="form-group">
            <label class="label">Data de vencimento</label>
            <input class="input" type="date" id="fVencimento">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="label">Órgão emissor</label>
            <input class="input" id="fOrgao" placeholder="Ex: SSP-BA">
          </div>
          <div class="form-group">
            <label class="label">Categoria (opcional)</label>
            <input class="input" id="fCategoria" placeholder="Ex: AB">
          </div>
        </div>
        <div class="form-group">
          <label class="label">Observações</label>
          <textarea class="input" id="fObs" rows="2" placeholder="Notas adicionais (opcional)"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer" id="modalFooter" style="display:none;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveDoc()">Salvar documento</button>
    </div>
  </div>
</div>

<!-- MODAL: VIEW DETAILS -->
<div class="modal-overlay" id="modalView">
  <div class="modal">
    <div class="modal-header">
      <h2 id="viewTitle">Documento</h2>
      <button class="modal-close" onclick="closeView()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body" id="viewBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeView()">Fechar</button>
      <button class="btn btn-secondary" onclick="editFromView()"><i data-lucide="pencil" class="icon-sm"></i> Editar</button>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://gwepkpbtcwvgxfgqhymb.supabase.co',
    'sb_publishable_0NiRNQMNyhdaX4LDEwNq8A_QkWpzM8J'
  );

  let currentUser = null, profile = null, documentos = [], currentFilter = 'todos', viewingDoc = null;

  (async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    const { data: p } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    profile = p || { id: currentUser.id, nome: '', email: currentUser.email, plano: 'gratis' };
    renderUser();
    await loadDocs();
    setupFilters();
    lucide.createIcons();
  })();

  function renderUser() {
    const nome = profile.nome || currentUser.email.split('@')[0];
    document.getElementById('sbUserName').textContent = nome;
    document.getElementById('sbAvatar').textContent = nome.charAt(0).toUpperCase();
    document.getElementById('sbUserPlan').textContent = { gratis: 'Plano grátis', premium: 'Premium', familia: 'Família' }[profile.plano] || 'Plano grátis';
  }

  async function loadDocs() {
    const { data } = await sb.from('documentos').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
    documentos = data || [];
    updateCounts();
    render();
  }

  function status(doc) {
    if (!doc.data_vencimento) return 'emdia';
    const diff = (new Date(doc.data_vencimento) - new Date()) / (1000*60*60*24);
    if (diff < 0) return 'vencido';
    if (diff <= 30) return 'vencendo';
    return 'emdia';
  }

  function updateCounts() {
    const c = { todos: documentos.length, emdia: 0, vencendo: 0, vencido: 0 };
    documentos.forEach(d => c[status(d)]++);
    document.getElementById('cntTodos').textContent = c.todos;
    document.getElementById('cntEmDia').textContent = c.emdia;
    document.getElementById('cntVencendo').textContent = c.vencendo;
    document.getElementById('cntVencido').textContent = c.vencido;
    document.getElementById('docsCount').textContent = `${documentos.length} documento${documentos.length!==1?'s':''} cadastrado${documentos.length!==1?'s':''}`;
  }

  function setupFilters() {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        currentFilter = b.dataset.filter;
        render();
      };
    });
  }

  const iconMap = { RG: 'badge-check', CIN: 'badge-check', CPF: 'file-text', CNH: 'credit-card', PASSAPORTE: 'plane', TITULO_ELEITOR: 'vote', CERTIDAO_NASCIMENTO: 'baby', CERTIDAO_CASAMENTO: 'heart', CARTEIRA_TRABALHO: 'briefcase', CARTEIRA_VACINACAO: 'syringe', OUTRO: 'file' };
  const corMap = ['coral', 'menta', 'lavanda', 'sol', 'alerta', 'perigo'];
  const tipoLabel = { RG: 'RG', CIN: 'CIN', CPF: 'CPF', CNH: 'CNH', PASSAPORTE: 'Passaporte', TITULO_ELEITOR: 'Título de Eleitor', CERTIDAO_NASCIMENTO: 'Certidão Nascimento', CERTIDAO_CASAMENTO: 'Certidão Casamento', CARTEIRA_TRABALHO: 'CTPS', CARTEIRA_VACINACAO: 'Vacinação', OUTRO: 'Outro' };

  function badge(doc) {
    const s = status(doc);
    if (s === 'emdia') return '<span class="badge badge-menta">Em dia</span>';
    if (s === 'vencido') return '<span class="badge badge-perigo">Vencido</span>';
    const diff = Math.ceil((new Date(doc.data_vencimento) - new Date()) / (1000*60*60*24));
    return `<span class="badge badge-alerta">${diff}d</span>`;
  }

  function render() {
    const filtered = currentFilter === 'todos' ? documentos : documentos.filter(d => status(d) === currentFilter);
    const container = document.getElementById('docsContainer');
    if (filtered.length === 0) {
      if (documentos.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon-box icon-box-lg coral"><i data-lucide="folder-plus" class="icon-xl"></i></div>
            <h3>Nenhum documento ainda</h3>
            <p>Comece adicionando RG, CPF, CNH ou qualquer outro documento. A Bia pode ler a foto e preencher tudo automaticamente.</p>
            <button class="btn btn-primary" onclick="openAddModal()"><i data-lucide="plus" class="icon-sm"></i> Adicionar primeiro documento</button>
          </div>`;
      } else {
        container.innerHTML = `<div class="empty-state"><h3>Nenhum nesse filtro</h3><p>Tente outro filtro acima.</p></div>`;
      }
      lucide.createIcons();
      return;
    }
    container.innerHTML = '<div class="docs-grid">' + filtered.map((d, i) => {
      const icon = iconMap[d.tipo] || 'file';
      const cor = corMap[i % corMap.length];
      const venc = d.data_vencimento ? 'Vence ' + new Date(d.data_vencimento).toLocaleDateString('pt-BR') : 'Sem vencimento';
      return `
        <div class="doc-card" onclick="viewDoc('${d.id}')">
          <div class="doc-card-actions">
            <button class="doc-act-btn" onclick="event.stopPropagation(); editDoc('${d.id}')" title="Editar"><i data-lucide="pencil"></i></button>
            <button class="doc-act-btn danger" onclick="event.stopPropagation(); deleteDoc('${d.id}')" title="Excluir"><i data-lucide="trash-2"></i></button>
          </div>
          <div class="doc-card-top">
            <div class="icon-box ${cor}"><i data-lucide="${icon}"></i></div>
            ${badge(d)}
          </div>
          <h3>${d.nome || tipoLabel[d.tipo] || 'Documento'}</h3>
          <div class="doc-card-meta">${tipoLabel[d.tipo] || 'Outro'} · ${venc}</div>
          ${d.numero ? `<div class="doc-card-num">${d.numero}</div>` : ''}
        </div>`;
    }).join('') + '</div>';
    lucide.createIcons();
  }

  // ===== MODAL ADD =====
  function openAddModal() {
    document.getElementById('modalTitle').textContent = 'Adicionar documento';
    document.getElementById('modalStep1').style.display = 'block';
    document.getElementById('modalStep2').style.display = 'none';
    document.getElementById('modalFooter').style.display = 'none';
    clearForm();
    document.getElementById('modalDoc').classList.add('show');
    lucide.createIcons();
  }
  function closeModal() {
    document.getElementById('modalDoc').classList.remove('show');
  }
  function showFormStep() {
    document.getElementById('modalStep1').style.display = 'none';
    document.getElementById('modalStep2').style.display = 'block';
    document.getElementById('modalFooter').style.display = 'flex';
  }
  function clearForm() {
    ['fDocId','fNome','fNumero','fEmissao','fVencimento','fOrgao','fCategoria','fObs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fTipo').value = '';
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('previewImg').src = '';
    document.getElementById('ocrStatus').classList.remove('show');
  }

  async function onFileSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    showFormStep();
    if (!file.type.startsWith('image/')) {
      // PDF — sem OCR por enquanto
      document.getElementById('fNome').focus();
      return;
    }
    // Image: preview + OCR
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      const img = document.getElementById('previewImg');
      img.src = dataUrl;
      img.style.display = 'block';

      // Extrai base64 puro
      const base64 = dataUrl.split(',')[1];
      const mediaType = file.type;

      document.getElementById('ocrStatus').classList.add('show');
      try {
        const r = await fetch('/api/ocr', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64, mediaType })
        });
        const json = await r.json();
        document.getElementById('ocrStatus').classList.remove('show');
        if (json.data) fillFromOcr(json.data);
        else alert('A Bia não conseguiu ler. Preencha manualmente.');
      } catch (err) {
        document.getElementById('ocrStatus').classList.remove('show');
        alert('Erro ao ler o documento. Preencha manualmente.');
      }
    };
    reader.readAsDataURL(file);
  }

  function fillFromOcr(data) {
    if (data.tipo) document.getElementById('fTipo').value = data.tipo;
    if (data.numero) document.getElementById('fNumero').value = data.numero;
    if (data.data_emissao) document.getElementById('fEmissao').value = data.data_emissao;
    if (data.data_vencimento) document.getElementById('fVencimento').value = data.data_vencimento;
    if (data.orgao_emissor) document.getElementById('fOrgao').value = data.orgao_emissor;
    if (data.categoria) document.getElementById('fCategoria').value = data.categoria;
    if (data.observacoes) document.getElementById('fObs').value = data.observacoes;
    if (!document.getElementById('fNome').value) {
      const tipoNome = tipoLabel[data.tipo] || 'Documento';
      document.getElementById('fNome').value = tipoNome;
    }
    // Se CPF veio no doc, atualiza profile
    if (data.cpf && !profile.cpf) {
      sb.from('profiles').update({ cpf: data.cpf }).eq('id', currentUser.id);
      profile.cpf = data.cpf;
    }
    if (data.nome && !profile.nome) {
      sb.from('profiles').update({ nome: data.nome }).eq('id', currentUser.id);
      profile.nome = data.nome;
    }
  }

  async function saveDoc() {
    const id = document.getElementById('fDocId').value;
    const payload = {
      user_id: currentUser.id,
      nome: document.getElementById('fNome').value.trim() || tipoLabel[document.getElementById('fTipo').value] || 'Documento',
      tipo: document.getElementById('fTipo').value || null,
      numero: document.getElementById('fNumero').value.trim() || null,
      data_emissao: document.getElementById('fEmissao').value || null,
      data_vencimento: document.getElementById('fVencimento').value || null,
      orgao_emissor: document.getElementById('fOrgao').value.trim() || null,
      categoria: document.getElementById('fCategoria').value.trim() || null,
      observacoes: document.getElementById('fObs').value.trim() || null
    };
    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = 'Salvando...';
    let result;
    if (id) {
      result = await sb.from('documentos').update(payload).eq('id', id);
    } else {
      result = await sb.from('documentos').insert(payload);
    }
    btn.disabled = false; btn.textContent = 'Salvar documento';
    if (result.error) { alert('Erro ao salvar: ' + result.error.message); return; }
    closeModal();
    const wasFirst = documentos.length === 0 && !id;
    await loadDocs();
    if (wasFirst && window.confetti) {
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FF5A36','#FFD93D','#06D6A0','#7C3AED'] });
    }
  }

  function editDoc(id) {
    const d = documentos.find(x => x.id === id);
    if (!d) return;
    document.getElementById('modalTitle').textContent = 'Editar documento';
    document.getElementById('modalStep1').style.display = 'none';
    document.getElementById('modalStep2').style.display = 'block';
    document.getElementById('modalFooter').style.display = 'flex';
    document.getElementById('fDocId').value = d.id;
    document.getElementById('fNome').value = d.nome || '';
    document.getElementById('fTipo').value = d.tipo || '';
    document.getElementById('fNumero').value = d.numero || '';
    document.getElementById('fEmissao').value = d.data_emissao || '';
    document.getElementById('fVencimento').value = d.data_vencimento || '';
    document.getElementById('fOrgao').value = d.orgao_emissor || '';
    document.getElementById('fCategoria').value = d.categoria || '';
    document.getElementById('fObs').value = d.observacoes || '';
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('modalDoc').classList.add('show');
    lucide.createIcons();
  }

  async function deleteDoc(id) {
    const d = documentos.find(x => x.id === id);
    if (!d) return;
    if (!confirm(`Excluir "${d.nome}"? Essa ação não pode ser desfeita.`)) return;
    const { error } = await sb.from('documentos').delete().eq('id', id);
    if (error) { alert('Erro: ' + error.message); return; }
    await loadDocs();
  }

  function viewDoc(id) {
    const d = documentos.find(x => x.id === id);
    if (!d) return;
    viewingDoc = d;
    document.getElementById('viewTitle').textContent = d.nome || tipoLabel[d.tipo] || 'Documento';
    const fmt = (v) => v ? new Date(v).toLocaleDateString('pt-BR') : '—';
    document.getElementById('viewBody').innerHTML = `
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:20px;">
        <div class="icon-box icon-box-lg coral"><i data-lucide="${iconMap[d.tipo] || 'file'}" class="icon-xl"></i></div>
        <div>
          <h3 style="font-size:18px; margin-bottom:4px;">${d.nome || tipoLabel[d.tipo]}</h3>
          <div style="font-size:13px; color:var(--cinza);">${tipoLabel[d.tipo] || 'Outro'}</div>
        </div>
        <div style="margin-left:auto;">${badge(d)}</div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div><div style="font-size:11px; color:var(--cinza); text-transform:uppercase; letter-spacing:1px; font-weight:700;">Número</div><div style="font-size:14px; margin-top:4px;">${d.numero || '—'}</div></div>
        <div><div style="font-size:11px; color:var(--cinza); text-transform:uppercase; letter-spacing:1px; font-weight:700;">Órgão emissor</div><div style="font-size:14px; margin-top:4px;">${d.orgao_emissor || '—'}</div></div>
        <div><div style="font-size:11px; color:var(--cinza); text-transform:uppercase; letter-spacing:1px; font-weight:700;">Emissão</div><div style="font-size:14px; margin-top:4px;">${fmt(d.data_emissao)}</div></div>
        <div><div style="font-size:11px; color:var(--cinza); text-transform:uppercase; letter-spacing:1px; font-weight:700;">Vencimento</div><div style="font-size:14px; margin-top:4px;">${fmt(d.data_vencimento)}</div></div>
        ${d.categoria ? `<div><div style="font-size:11px; color:var(--cinza); text-transform:uppercase; letter-spacing:1px; font-weight:700;">Categoria</div><div style="font-size:14px; margin-top:4px;">${d.categoria}</div></div>` : ''}
      </div>
      ${d.observacoes ? `<div style="margin-top:18px;"><div style="font-size:11px; color:var(--cinza); text-transform:uppercase; letter-spacing:1px; font-weight:700;">Observações</div><div style="font-size:14px; margin-top:4px; color:var(--noite); line-height:1.6;">${d.observacoes}</div></div>` : ''}
    `;
    document.getElementById('modalView').classList.add('show');
    lucide.createIcons();
  }
  function closeView() { document.getElementById('modalView').classList.remove('show'); }
  function editFromView() { closeView(); editDoc(viewingDoc.id); }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sbOverlay').classList.toggle('show');
  }
  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
