<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertas — MeuDoc.app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/app-shell.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-btn {
    padding: 8px 14px;
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: var(--r-full);
    font-family: var(--font-display);
    font-size: 13px; font-weight: 600;
    color: var(--cinza);
    cursor: pointer; transition: all var(--t);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .filter-btn:hover { border-color: var(--coral); color: var(--coral); }
  .filter-btn.active { background: var(--noite); color: var(--branco); border-color: var(--noite); }
  .filter-btn .count { background: rgba(255,255,255,0.2); padding: 1px 7px; border-radius: var(--r-full); font-size: 11px; }
  .filter-btn:not(.active) .count { background: var(--neve); color: var(--cinza); }

  .alert-card {
    background: var(--branco);
    border: 1px solid var(--borda);
    border-left: 4px solid var(--coral);
    border-radius: var(--r-md);
    padding: 18px 20px;
    margin-bottom: 10px;
    display: flex; align-items: flex-start; gap: 16px;
    transition: all var(--t);
  }
  .alert-card:hover { box-shadow: var(--sh-sm); }
  .alert-card.lido { opacity: 0.55; }
  .alert-card.perigo { border-left-color: var(--perigo); }
  .alert-card.alerta { border-left-color: var(--alerta); }
  .alert-card.menta { border-left-color: var(--menta); }
  .alert-card.lavanda { border-left-color: var(--lavanda); }

  .alert-icon { flex-shrink: 0; }
  .alert-body { flex: 1; min-width: 0; }
  .alert-title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--noite); margin-bottom: 4px; }
  .alert-desc { font-size: 13px; color: var(--cinza); line-height: 1.5; }
  .alert-meta { font-size: 11px; color: var(--cinza-claro); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .alert-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .alert-act {
    width: 32px; height: 32px;
    border-radius: var(--r-sm);
    background: var(--neve);
    border: 1px solid var(--borda);
    color: var(--cinza);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .alert-act:hover { color: var(--noite); background: var(--branco); }
  .alert-act [data-lucide] { width: 16px; height: 16px; }

  .empty-state {
    background: var(--branco);
    border: 2px dashed var(--borda);
    border-radius: var(--r-lg);
    padding: 56px 32px;
    text-align: center;
  }
  .empty-state .icon-box { margin: 0 auto 16px; }
  .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
  .empty-state p { color: var(--cinza); max-width: 400px; margin: 0 auto 20px; line-height: 1.6; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo">MeuDoc<span>.app</span></div>
  <div class="sb-user">
    <div class="avatar" id="sbAvatar">M</div>
    <div class="sb-user-info">
      <div class="sb-user-name" id="sbUserName">Carregando...</div>
      <div class="sb-user-plan" id="sbUserPlan">Plano grátis</div>
    </div>
  </div>
  <nav class="sb-nav">
    <a href="dashboard.html" class="sb-link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    <a href="documentos.html" class="sb-link"><i data-lucide="folder"></i> Documentos</a>
    <a href="alertas.html" class="sb-link active"><i data-lucide="bell"></i> Alertas</a>
    <a href="agendamentos.html" class="sb-link"><i data-lucide="calendar"></i> Agenda</a>
    <a href="assistente.html" class="sb-link"><i data-lucide="sparkles"></i> Bia (assistente)</a>
    <div class="sb-section">Conta</div>
    <a href="perfil.html" class="sb-link"><i data-lucide="user"></i> Perfil</a>
  </nav>
  <div class="sb-footer">
    <a href="#" class="sb-link" onclick="logout();return false;"><i data-lucide="log-out"></i> Sair</a>
  </div>
</aside>
<div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>

<main class="content">
  <header class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="menu-toggle-mobile" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
      <div class="greeting">
        <h1>Alertas</h1>
        <p id="alertasCount">Carregando alertas...</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="markAllRead()"><i data-lucide="check-check" class="icon-sm"></i> Marcar tudo como lido</button>
    </div>
  </header>

  <div class="page">
    <div class="filters">
      <button class="filter-btn active" data-filter="todos">Todos <span class="count" id="cntTodos">0</span></button>
      <button class="filter-btn" data-filter="naolidos">Não lidos <span class="count" id="cntNaoLidos">0</span></button>
      <button class="filter-btn" data-filter="vencidos">Vencidos <span class="count" id="cntVencidos">0</span></button>
      <button class="filter-btn" data-filter="vencendo">Vencendo <span class="count" id="cntVencendo">0</span></button>
    </div>

    <div id="alertasContainer"></div>
  </div>
</main>

<!-- BOTTOM NAV mobile -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="bn-item"><i data-lucide="home"></i><span>Início</span></a>
  <a href="documentos.html" class="bn-item"><i data-lucide="folder"></i><span>Docs</span></a>
  <a href="assistente.html" class="bn-item bn-center"><i data-lucide="sparkles"></i><span>Bia</span></a>
  <a href="alertas.html" class="bn-item active"><i data-lucide="bell"></i><span>Alertas</span></a>
  <a href="perfil.html" class="bn-item"><i data-lucide="user"></i><span>Perfil</span></a>
</nav>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://gwepkpbtcwvgxfgqhymb.supabase.co',
    'sb_publishable_0NiRNQMNyhdaX4LDEwNq8A_QkWpzM8J'
  );

  let currentUser = null, profile = null, alertas = [], currentFilter = 'todos';

  (async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    const { data: p } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    profile = p || { id: currentUser.id, email: currentUser.email, plano: 'gratis' };
    renderUser();

    const { data: docs } = await sb.from('documentos').select('*').eq('user_id', currentUser.id);
    alertas = gerarAlertas(docs || []);
    updateCounts();
    setupFilters();
    render();
    lucide.createIcons();
  })();

  function renderUser() {
    const nome = profile.nome || currentUser.email.split('@')[0];
    document.getElementById('sbUserName').textContent = nome;
    document.getElementById('sbAvatar').textContent = nome.charAt(0).toUpperCase();
    document.getElementById('sbUserPlan').textContent = { gratis: 'Plano grátis', premium: 'Premium', familia: 'Família' }[profile.plano] || 'Plano grátis';
  }

  function lidos() { return JSON.parse(localStorage.getItem('meudoc_lidos_' + currentUser.id) || '[]'); }
  function marcarLido(id) {
    const l = lidos();
    if (!l.includes(id)) { l.push(id); localStorage.setItem('meudoc_lidos_' + currentUser.id, JSON.stringify(l)); }
  }

  function gerarAlertas(docs) {
    const hoje = new Date();
    const lidosArr = lidos();
    const out = [];
    docs.forEach(d => {
      if (!d.data_vencimento) return;
      const venc = new Date(d.data_vencimento);
      const diff = Math.floor((venc - hoje) / (1000*60*60*24));
      const nome = d.nome || d.tipo || 'Documento';
      let alerta = null;
      if (diff < 0) {
        const id = `venc-${d.id}`;
        alerta = { id, tipo: 'vencido', cor: 'perigo', icon: 'alert-octagon', titulo: `${nome} venceu`, desc: `Esse documento venceu há ${Math.abs(diff)} dia${Math.abs(diff)!==1?'s':''}. Renove o quanto antes.`, doc_id: d.id, data: d.data_vencimento };
      } else if (diff <= 5) {
        alerta = { id: `5d-${d.id}`, tipo: 'vencendo', cor: 'perigo', icon: 'alert-triangle', titulo: `${nome} vence em ${diff} dia${diff!==1?'s':''}`, desc: 'Atenção! Documento prestes a vencer. Cuide da renovação agora.', doc_id: d.id, data: d.data_vencimento };
      } else if (diff <= 15) {
        alerta = { id: `15d-${d.id}`, tipo: 'vencendo', cor: 'alerta', icon: 'alert-triangle', titulo: `${nome} vence em ${diff} dias`, desc: 'Recomendamos planejar a renovação nas próximas semanas.', doc_id: d.id, data: d.data_vencimento };
      } else if (diff <= 30) {
        alerta = { id: `30d-${d.id}`, tipo: 'vencendo', cor: 'alerta', icon: 'clock', titulo: `${nome} vence em ${diff} dias`, desc: 'Fique de olho. Em breve será hora de renovar.', doc_id: d.id, data: d.data_vencimento };
      }
      if (alerta) { alerta.lido = lidosArr.includes(alerta.id); out.push(alerta); }
    });

    // Alerta sobre perfil incompleto
    if (!profile.cpf || !profile.cidade) {
      const id = 'perfil-incompleto';
      out.unshift({ id, tipo: 'sistema', cor: 'lavanda', icon: 'user', titulo: 'Complete seu perfil', desc: 'Adicione CPF e cidade pra ativar a carteira digital com QR Code e personalizar suas respostas da Bia.', doc_id: null, lido: lidosArr.includes(id) });
    }
    return out;
  }

  function updateCounts() {
    const c = {
      todos: alertas.length,
      naolidos: alertas.filter(a => !a.lido).length,
      vencidos: alertas.filter(a => a.tipo === 'vencido').length,
      vencendo: alertas.filter(a => a.tipo === 'vencendo').length,
    };
    document.getElementById('cntTodos').textContent = c.todos;
    document.getElementById('cntNaoLidos').textContent = c.naolidos;
    document.getElementById('cntVencidos').textContent = c.vencidos;
    document.getElementById('cntVencendo').textContent = c.vencendo;
    const naoLidos = c.naolidos;
    document.getElementById('alertasCount').textContent = naoLidos > 0 ? `${naoLidos} alerta${naoLidos>1?'s':''} não lido${naoLidos>1?'s':''}` : 'Tudo lido por aqui!';
  }

  function setupFilters() {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        currentFilter = b.dataset.filter;
        render();
      };
    });
  }

  function filtra(a) {
    if (currentFilter === 'todos') return true;
    if (currentFilter === 'naolidos') return !a.lido;
    if (currentFilter === 'vencidos') return a.tipo === 'vencido';
    if (currentFilter === 'vencendo') return a.tipo === 'vencendo';
    return true;
  }

  function render() {
    const container = document.getElementById('alertasContainer');
    const filtered = alertas.filter(filtra);
    if (filtered.length === 0) {
      if (alertas.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon-box icon-box-lg menta"><i data-lucide="bell-off" class="icon-xl"></i></div>
            <h3>Nenhum alerta por enquanto</h3>
            <p>Quando seus documentos estiverem perto de vencer, avisamos por aqui. Adicione documentos pra começar a receber alertas.</p>
            <a href="documentos.html" class="btn btn-primary">Adicionar documento</a>
          </div>`;
      } else {
        container.innerHTML = `<div class="empty-state"><h3>Nada nesse filtro</h3><p>Tente outro filtro acima.</p></div>`;
      }
      lucide.createIcons();
      return;
    }
    container.innerHTML = filtered.map(a => `
      <div class="alert-card ${a.cor} ${a.lido ? 'lido' : ''}">
        <div class="icon-box ${a.cor}"><i data-lucide="${a.icon}"></i></div>
        <div class="alert-body">
          <div class="alert-title">${a.titulo}</div>
          <div class="alert-desc">${a.desc}</div>
          <div class="alert-meta">${a.data ? '<i data-lucide="calendar" style="width:12px;height:12px;"></i> Vence ' + new Date(a.data).toLocaleDateString('pt-BR') : ''}</div>
        </div>
        <div class="alert-actions">
          ${!a.lido ? `<button class="alert-act" onclick="ler('${a.id}')" title="Marcar como lido"><i data-lucide="check"></i></button>` : ''}
          ${a.doc_id ? `<button class="alert-act" onclick="window.location='documentos.html'" title="Ver documento"><i data-lucide="external-link"></i></button>` : `<button class="alert-act" onclick="window.location='perfil.html'" title="Ir pro perfil"><i data-lucide="external-link"></i></button>`}
        </div>
      </div>
    `).join('');
    lucide.createIcons();
  }

  function ler(id) {
    marcarLido(id);
    const a = alertas.find(x => x.id === id);
    if (a) a.lido = true;
    updateCounts();
    render();
  }

  function markAllRead() {
    alertas.forEach(a => { marcarLido(a.id); a.lido = true; });
    updateCounts();
    render();
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sbOverlay').classList.toggle('show');
  }
  async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }
</script>
</body>
</html>
