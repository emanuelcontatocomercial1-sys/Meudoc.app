<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira Digital — MeuDoc.app</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { min-height: 100%; }
  body {
    background: linear-gradient(180deg, var(--noite) 0%, #1e293b 60%, var(--noite) 100%);
    color: var(--branco);
    padding: 20px;
    font-family: var(--font-body);
    min-height: 100vh;
  }
  .container { max-width: 480px; margin: 0 auto; }

  .brand-top {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 16px 0 28px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
  }
  .brand-top strong { color: var(--branco); font-family: var(--font-display); font-weight: 800; }
  .brand-top strong span { color: var(--coral); }

  .titular-card {
    background: linear-gradient(135deg, var(--coral) 0%, var(--lavanda) 100%);
    border-radius: var(--r-xl);
    padding: 24px;
    margin-bottom: 20px;
    color: var(--branco);
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .titular-card::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
  }
  .titular-tag {
    font-size: 11px; color: rgba(255,255,255,0.75);
    text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
    margin-bottom: 6px; position: relative;
  }
  .titular-nome {
    font-family: var(--font-display);
    font-weight: 800; font-size: 28px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    position: relative;
  }
  .titular-cpf {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    opacity: 0.9;
    margin-bottom: 14px;
    position: relative;
  }
  .badges-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    position: relative;
  }
  .verify-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    padding: 5px 10px;
    border-radius: var(--r-full);
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .verify-badge [data-lucide] { width: 12px; height: 12px; stroke-width: 3; }

  .docs-stack { display: flex; flex-direction: column; gap: 12px; }
  .doc-item {
    background: var(--branco);
    color: var(--noite);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .doc-item-header {
    padding: 14px 18px;
    background: var(--neve);
    border-bottom: 1px solid var(--borda);
    display: flex; align-items: center; justify-content: space-between;
  }
  .doc-item-tipo {
    font-family: var(--font-display);
    font-weight: 800; font-size: 13px;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--noite);
  }
  .doc-item-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--menta-light); color: var(--menta-dark);
    padding: 4px 10px;
    border-radius: var(--r-full);
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .doc-item-badge [data-lucide] { width: 11px; height: 11px; stroke-width: 3; }

  .doc-photos { width: 100%; background: var(--neve); }
  .doc-photo-slot {
    width: 100%;
    aspect-ratio: 8/5;
    background: var(--neve);
    overflow: hidden;
    position: relative;
    border-bottom: 1px solid var(--borda);
  }
  .doc-photo-slot:last-child { border-bottom: none; }
  .doc-photo-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .doc-photo-label {
    position: absolute; top: 10px; left: 10px;
    background: rgba(15,23,42,0.75);
    backdrop-filter: blur(8px);
    color: var(--branco);
    padding: 4px 10px;
    border-radius: var(--r-full);
    font-size: 10px; font-weight: 800;
    font-family: var(--font-display);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .doc-photo-empty {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--neve) 0%, var(--coral-light) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--cinza-claro); font-size: 12px;
    padding: 24px;
    text-align: center;
  }
  .doc-photo-empty [data-lucide] { width: 36px; height: 36px; }

  .doc-data {
    padding: 14px 18px;
    display: grid; gap: 8px;
  }
  .doc-line {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--borda);
  }
  .doc-line:last-child { border-bottom: none; }
  .doc-line-label { color: var(--cinza); }
  .doc-line-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--noite); }

  .meta {
    margin-top: 24px;
    padding: 16px;
    background: rgba(255,255,255,0.05);
    border-radius: var(--r-md);
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }
  .meta a { color: var(--coral); font-weight: 600; }
  .meta-icon { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .meta-icon [data-lucide] { width: 14px; height: 14px; }

  .error-card {
    background: var(--branco);
    color: var(--noite);
    border-radius: var(--r-lg);
    padding: 32px;
    text-align: center;
    max-width: 420px;
    margin: 40px auto;
  }
  .error-card [data-lucide] { width: 44px; height: 44px; color: var(--perigo); margin-bottom: 12px; }
  .error-card h2 { font-size: 20px; margin-bottom: 8px; }
  .error-card p { color: var(--cinza); line-height: 1.6; margin-bottom: 16px; }

  .skel { background: rgba(255,255,255,0.08); border-radius: var(--r-lg); animation: pulse 2s infinite; }
</style>
</head>
<body>

<div class="container">
  <div class="brand-top">
    Carteira digital · <strong>MeuDoc<span>.app</span></strong>
  </div>
  <div id="root"></div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://gwepkpbtcwvgxfgqhymb.supabase.co',
    'sb_publishable_0NiRNQMNyhdaX4LDEwNq8A_QkWpzM8J'
  );

  const tipoLabel = {
    RG: 'Carteira de Identidade',
    CIN: 'Carteira de Identidade Nacional',
    CPF: 'CPF',
    CNH: 'Carteira de Habilitação',
    PASSAPORTE: 'Passaporte'
  };

  function decodeData() {
    const params = new URLSearchParams(window.location.search);
    const d = params.get('d');
    if (!d) return null;
    try {
      const json = atob(d.replace(/-/g, '+').replace(/_/g, '/'));
      return JSON.parse(decodeURIComponent(escape(json)));
    } catch (e) {
      try { return JSON.parse(atob(d)); } catch (e2) { return null; }
    }
  }

  function fmtCpf(c) {
    if (!c) return null;
    const v = String(c).replace(/\D/g, '');
    if (v.length !== 11) return c;
    return `***.${v.slice(3,6)}.${v.slice(6,9)}-**`;
  }

  function fmtDate(s) {
    if (!s) return '—';
    return new Date(s).toLocaleDateString('pt-BR');
  }

  function mask(num, keep = 3) {
    if (!num) return null;
    const s = String(num);
    if (s.length <= keep) return s;
    return '•'.repeat(Math.max(s.length - keep, 3)) + s.slice(-keep);
  }

  function getPublicUrl(path) {
    if (!path) return null;
    const { data } = sb.storage.from('documentos').getPublicUrl(path);
    return data?.publicUrl || null;
  }

  function showError(msg) {
    document.getElementById('root').innerHTML = `
      <div class="error-card">
        <i data-lucide="alert-circle"></i>
        <h2>Carteira não encontrada</h2>
        <p>${msg}</p>
        <a href="/" class="btn btn-primary">Conhecer o MeuDoc.app</a>
      </div>`;
    lucide.createIcons();
  }

  async function render() {
    const data = decodeData();
    if (!data || (!data.uid && !data.n)) {
      return showError('Esse link não é uma carteira válida. Verifique se o QR Code foi gerado pelo MeuDoc.app.');
    }

    // Se tem uid (formato novo), busca dados completos via RPC publica
    if (data.uid) {
      const { data: rows, error } = await sb.rpc('carteira_publica', { p_user_id: data.uid });
      if (error || !rows || rows.length === 0) {
        return showError('Não consegui carregar essa carteira. Pode ter sido removida ou expirada.');
      }
      const row = rows[0];
      const docs = Array.isArray(row.documentos) ? row.documentos : (typeof row.documentos === 'string' ? JSON.parse(row.documentos) : []);
      renderCarteira(row.nome || data.n || 'Titular', row.cpf, docs, data.t);
      return;
    }

    // Formato antigo (so dados no QR, sem foto) — fallback
    const docsLegacy = [];
    if (data.rg) docsLegacy.push({ tipo: 'RG', numero: data.rg });
    if (data.cnh) docsLegacy.push({ tipo: 'CNH', numero: data.cnh });
    renderCarteira(data.n, data.cpf, docsLegacy, data.t);
  }

  function renderCarteira(nome, cpf, docs, timestamp) {
    const ts = timestamp ? new Date(timestamp * 1000) : new Date();
    const dataGen = ts.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

    const docsHtml = (docs || []).filter(d => d).map(d => {
      const tipoLbl = tipoLabel[d.tipo] || d.tipo || 'Documento';
      const frenteUrl = getPublicUrl(d.arquivo_frente_path);
      const versoUrl = getPublicUrl(d.arquivo_verso_path);
      let photoBlock = '';
      if (frenteUrl || versoUrl) {
        photoBlock = '<div class="doc-photos">';
        if (frenteUrl) photoBlock += `<div class="doc-photo-slot"><span class="doc-photo-label">Frente</span><img src="${frenteUrl}" alt="${tipoLbl} (frente)" loading="lazy"></div>`;
        if (versoUrl) photoBlock += `<div class="doc-photo-slot"><span class="doc-photo-label">Verso</span><img src="${versoUrl}" alt="${tipoLbl} (verso)" loading="lazy"></div>`;
        photoBlock += '</div>';
      } else {
        photoBlock = `<div class="doc-photo-slot"><div class="doc-photo-empty"><i data-lucide="image-off"></i><div>Foto não cadastrada<br><span style="font-size:11px; opacity:0.7;">Titular precisa adicionar a foto no app</span></div></div></div>`;
      }
      return `
        <div class="doc-item">
          <div class="doc-item-header">
            <div class="doc-item-tipo">${tipoLbl}</div>
            <div class="doc-item-badge"><i data-lucide="shield-check"></i> Verificado</div>
          </div>
          ${photoBlock}
          <div class="doc-data">
            ${d.numero ? `<div class="doc-line"><span class="doc-line-label">Número</span><span class="doc-line-val">${mask(d.numero, 3)}</span></div>` : ''}
            ${d.orgao_emissor ? `<div class="doc-line"><span class="doc-line-label">Órgão emissor</span><span class="doc-line-val">${d.orgao_emissor}</span></div>` : ''}
            ${d.data_emissao ? `<div class="doc-line"><span class="doc-line-label">Emissão</span><span class="doc-line-val">${fmtDate(d.data_emissao)}</span></div>` : ''}
            ${d.data_vencimento ? `<div class="doc-line"><span class="doc-line-label">Vencimento</span><span class="doc-line-val">${fmtDate(d.data_vencimento)}</span></div>` : ''}
          </div>
        </div>`;
    }).join('');

    document.getElementById('root').innerHTML = `
      <div class="titular-card">
        <div class="titular-tag">Titular da carteira</div>
        <div class="titular-nome">${nome || 'Titular'}</div>
        <div class="titular-cpf">${cpf ? 'CPF ' + fmtCpf(cpf) : ''}</div>
        <div class="badges-row">
          <div class="verify-badge"><i data-lucide="shield-check"></i> Cadastrado por foto</div>
          <div class="verify-badge"><i data-lucide="lock"></i> Integridade verificada</div>
        </div>
      </div>

      ${docs && docs.length > 0
        ? `<div class="docs-stack">${docsHtml}</div>`
        : '<div class="meta" style="background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.85);">Esse titular ainda não tem documentos cadastrados na carteira.</div>'}

      <div class="meta">
        <div class="meta-icon"><i data-lucide="clock"></i> Gerada em ${dataGen}</div>
        Carteira do MeuDoc.app · <a href="/">conhecer o app</a><br>
        <span style="font-size:11px; opacity:0.7;">Verificação privada, não substitui documento oficial.</span>
      </div>
    `;
    lucide.createIcons();
  }

  render();
</script>
</body>
</html>
